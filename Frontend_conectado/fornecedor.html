<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel do Fornecedor | Kakuab Market</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/home.css">
  <style>
    body { background: #f6f7f2; }
    .dashboard { max-width: 1100px; margin: 40px auto; padding: 24px; }
    .dash-header { display: flex; justify-content: space-between; align-items: center; gap: 16px; margin-bottom: 24px; }
    .dash-card { background: #fff; border-radius: 18px; padding: 22px; box-shadow: 0 10px 30px rgba(0,0,0,.08); margin-bottom: 24px; }
    .form-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }
    .form-grid input, .form-grid select, .form-grid textarea { width: 100%; padding: 13px; border: 1px solid #d8ddce; border-radius: 12px; font: inherit; }
    .form-grid textarea { grid-column: 1 / -1; min-height: 90px; }
    .full { grid-column: 1 / -1; }
    .btn { border: 0; border-radius: 12px; padding: 12px 16px; cursor: pointer; font-weight: 700; }
    .btn-primary { background: #0b7d3b; color: white; }
    .btn-danger { background: #b42318; color: white; }
    .btn-light { background: #e9efe1; color: #0f3d25; }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px; border-bottom: 1px solid #e6e6e6; text-align: left; }
    .status { padding: 4px 10px; border-radius: 999px; background: #e9efe1; font-size: .85rem; }
    #msg { margin-bottom: 16px; font-weight: 700; }
    @media (max-width: 720px) { .form-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <main class="dashboard">
    <div class="dash-header">
      <div>
        <h1>Painel do Fornecedor</h1>
        <p>Crie, liste, edite e remova anúncios conectados ao backend.</p>
      </div>
      <button class="btn btn-light" onclick="logout()">Sair</button>
    </div>

    <div id="msg"></div>

    <section class="dash-card">
      <h2 id="formTitle">Criar anúncio</h2>
      <form id="anuncioForm" class="form-grid">
        <input type="hidden" id="anuncioId">
        <input id="titulo" name="titulo" placeholder="Título do anúncio" required>
        <select id="categoria" name="categoria" required>
          <option value="">Selecione a categoria</option>
          <option value="chips">Chips</option>
          <option value="castanhas">Castanhas</option>
          <option value="outros">Outros</option>
        </select>
        <input id="marca" name="marca" placeholder="Marca">
        <input id="moq" name="moq" type="number" placeholder="MOQ / quantidade mínima">
        <input id="unidade_embalagem" name="unidade_embalagem" placeholder="Unidade/embalagem">
        <input id="regiao_atendida" name="regiao_atendida" placeholder="Região atendida">
        <input id="prazo_entrega" name="prazo_entrega" placeholder="Prazo de entrega">
        <input id="formas_contato" name="formas_contato" placeholder="Formas de contato">
        <textarea id="descricao" name="descricao" placeholder="Descrição" required></textarea>
        <input class="full" id="imagem" name="imagem" type="file" accept="image/png,image/jpeg,image/webp">
        <button class="btn btn-primary" type="submit">Salvar anúncio</button>
        <button class="btn btn-light" type="button" onclick="limparFormulario()">Cancelar edição</button>
      </form>
    </section>

    <section class="dash-card">
      <h2>Meus anúncios</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Título</th>
              <th>Categoria</th>
              <th>Status</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="anunciosBody">
            <tr><td colspan="5">Carregando...</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="js/api.js"></script>
  <script src="js/fornecedor.js"></script>
</body>
</html>
