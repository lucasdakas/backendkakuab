<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Faça login no Kakuab Market - Marketplace B2B de produtos naturais e orgânicos">
  <title>Login | Kakuab Market</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/login.css">
  <!-- Material Icons -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
</head>
<body>
  <main class="login-wrapper">
    <!-- Left Side - Form -->
    <section class="login-left" aria-label="Formulário de Login">
      <div class="login-content">
        <h1 class="login-title">Faça parte do<br>KAKUAB MARKET</h1>
        <p class="login-subtitle">Conectando você ao natural 🌿</p>

        <form class="login-form" id="loginForm" action="#" method="POST">
          <div class="input-group">
            <span class="material-icons-outlined input-icon">person_outline</span>
            <input type="text" id="loginUser" placeholder="Nome de Usuário ou E-mail" required autocomplete="username">
          </div>

          <div class="input-group">
            <span class="material-icons-outlined input-icon">lock_outline</span>
            <input type="password" id="loginPassword" placeholder="Senha" required autocomplete="current-password">
            <button type="button" class="toggle-password" aria-label="Mostrar senha" data-target="loginPassword">
              <span class="material-icons-outlined">visibility_off</span>
            </button>
          </div>

          <a href="#" class="forgot-link">Não lembra sua senha?</a>

          <button type="submit" class="login-btn">Entrar</button>
        </form>

        <div class="register-prompt">
          <span>Não possui conta?</span>
          <a href="cadastro.html">Faça seu<br>cadastro!</a>
        </div>
      </div>
    </section>

    <!-- Right Side - Logo -->
    <section class="login-right" aria-label="Logo Kakuab Market">
      <div class="logo-container">
        <img src="assets/images/logo.png" alt="Logo Kakuab Market - Árvore">
      </div>
    </section>
  </main>

  <script src="js/api.js"></script>
  <script src="js/auth-page.js"></script>
</body>
</html>
